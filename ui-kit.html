<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheAgentFamily UI Kit</title>
    <style>
      :root {
        --bg0: #0b1020;
        --bg1: #0f1b3d;
        --glass: rgba(255, 255, 255, 0.08);
        --glass2: rgba(255, 255, 255, 0.12);
        --stroke: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.60);
        --shadow: rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(1200px 900px at 20% 0%, rgba(99, 102, 241, 0.35), transparent 55%),
          radial-gradient(1000px 800px at 90% 20%, rgba(168, 85, 247, 0.28), transparent 55%),
          radial-gradient(900px 700px at 40% 90%, rgba(34, 211, 238, 0.22), transparent 60%),
          linear-gradient(135deg, var(--bg0), var(--bg1));
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }

      .top {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .card {
        border: 1px solid var(--stroke);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.06));
        border-radius: 18px;
        box-shadow: 0 22px 60px var(--shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .hero {
        padding: 18px 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .btn {
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: radial-gradient(120px 80px at 20% 20%, rgba(255, 255, 255, 0.14), transparent 55%),
          linear-gradient(135deg, rgba(125, 211, 252, 0.14), rgba(168, 85, 247, 0.14));
        color: rgba(255, 255, 255, 0.92);
        border-radius: 999px;
        padding: 10px 14px;
        font-weight: 650;
        letter-spacing: -0.01em;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.35);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        padding: 14px;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .item {
        padding: 14px 14px 12px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      }

      .label {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.74);
        letter-spacing: 0.02em;
      }

      .img {
        width: 96px;
        height: 96px;
        display: block;
        filter: drop-shadow(0 12px 22px rgba(2, 6, 23, 0.35));
      }

      .wordmark {
        width: min(720px, 100%);
        height: auto;
        display: block;
        margin: 14px auto 0;
        filter: drop-shadow(0 20px 40px rgba(2, 6, 23, 0.45));
      }

      .avatars {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        padding: 14px;
      }

      @media (max-width: 980px) {
        .avatars {
          grid-template-columns: 1fr;
        }
      }

      .avatarImg {
        width: 160px;
        height: 160px;
        display: block;
        margin: 0 auto;
        filter: drop-shadow(0 18px 40px rgba(2, 6, 23, 0.45));
      }

      .sectionTitle {
        padding: 14px 14px 0;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.70);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="top">
        <div class="card hero" style="flex: 1 1 620px">
          <h1>UI icons + characters (glass + neural glow + glitch overlay)</h1>
          <p>
            This page previews the new SVG assets under <code>Contents/Resources/ui/</code>.
            Toggle Glitch Mode to swap to the <code>-glitch</code> variants.
          </p>
          <img class="wordmark mkAsset" data-normal="Contents/Resources/ui/wordmarks/glitch.svg" data-glitch="Contents/Resources/ui/wordmarks/glitch-glitch.svg" alt="GLITCH wordmark" />
        </div>
        <button class="btn" id="toggleBtn" type="button">Toggle Glitch Mode</button>
      </div>

      <div class="card" style="margin-top: 14px">
        <div class="sectionTitle">Memory Vault Icons</div>
        <div class="grid">
          <div class="item">
            <img class="img mkAsset" data-normal="Contents/Resources/ui/icons/vault-local.svg" data-glitch="Contents/Resources/ui/icons/vault-local-glitch.svg" alt="Vault Local" />
            <div class="label">LOCAL</div>
          </div>
          <div class="item">
            <img class="img mkAsset" data-normal="Contents/Resources/ui/icons/vault-download.svg" data-glitch="Contents/Resources/ui/icons/vault-download-glitch.svg" alt="Vault Download" />
            <div class="label">DOWNLOAD</div>
          </div>
          <div class="item">
            <img class="img mkAsset" data-normal="Contents/Resources/ui/icons/vault-upload.svg" data-glitch="Contents/Resources/ui/icons/vault-upload-glitch.svg" alt="Vault Upload" />
            <div class="label">UPLOAD</div>
          </div>
          <div class="item">
            <img class="img mkAsset" data-normal="Contents/Resources/ui/icons/vault-online.svg" data-glitch="Contents/Resources/ui/icons/vault-online-glitch.svg" alt="Vault Online" />
            <div class="label">ONLINE</div>
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 14px">
        <div class="sectionTitle">Characters</div>
        <div class="avatars">
          <div class="item">
            <img class="avatarImg mkAsset" data-normal="Contents/Resources/ui/characters/agent-neutral.svg" data-glitch="Contents/Resources/ui/characters/agent-neutral-glitch.svg" alt="Agent Neutral" />
            <div class="label" style="text-align: center">Neutral</div>
          </div>
          <div class="item">
            <img class="avatarImg mkAsset" data-normal="Contents/Resources/ui/characters/agent-angry.svg" data-glitch="Contents/Resources/ui/characters/agent-angry-glitch.svg" alt="Agent Angry" />
            <div class="label" style="text-align: center">Angry (glitch-triggered)</div>
          </div>
          <div class="item">
            <img class="avatarImg mkAsset" data-normal="Contents/Resources/ui/characters/agent-sad.svg" data-glitch="Contents/Resources/ui/characters/agent-sad-glitch.svg" alt="Agent Sad" />
            <div class="label" style="text-align: center">Sad (glitch-triggered)</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const KEY = "mkUiKitGlitchV1";
        const toggleBtn = document.getElementById("toggleBtn");
        const assets = Array.from(document.querySelectorAll(".mkAsset"));

        const apply = (enabled) => {
          document.body.dataset.glitch = enabled ? "1" : "0";
          for (const img of assets) {
            const src = enabled ? img.dataset.glitch : img.dataset.normal;
            if (src) img.src = src;
          }
          toggleBtn.textContent = enabled ? "Disable Glitch Mode" : "Enable Glitch Mode";
        };

        let enabled = false;
        try {
          enabled = localStorage.getItem(KEY) === "1";
        } catch {}
        apply(enabled);

        toggleBtn.addEventListener("click", () => {
          enabled = !enabled;
          try {
            localStorage.setItem(KEY, enabled ? "1" : "0");
          } catch {}
          apply(enabled);
        });
      })();
    </script>
  </body>
</html>
