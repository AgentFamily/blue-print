<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="GLITCH wordmark (Glitch)">
  <defs>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="45%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#f0abfc" />
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.70" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="240%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1a4a" flood-opacity="0.30" />
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#60a5fa" flood-opacity="0.38" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f0abfc" flood-opacity="0.22" />
    </filter>
    <filter id="pixelFireGlow" x="-30%" y="-60%" width="160%" height="240%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fb7185" flood-opacity="0.65" />
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f97316" flood-opacity="0.55" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f59e0b" flood-opacity="0.40" />
    </filter>
    <clipPath id="sliceA">
      <rect x="0" y="0" width="720" height="64" />
    </clipPath>
    <clipPath id="sliceB">
      <rect x="0" y="72" width="720" height="40" />
    </clipPath>
    <clipPath id="sliceC">
      <rect x="0" y="120" width="720" height="80" />
    </clipPath>
  </defs>

  <!-- Pixel-fire burst (behind text) -->
  <g shape-rendering="crispEdges" filter="url(#pixelFireGlow)" opacity="0.95">
    <!-- flame band -->
    <rect x="90" y="40" width="8" height="8" fill="#fb7185" opacity="0.55" />
    <rect x="98" y="40" width="8" height="8" fill="#f97316" opacity="0.62" />
    <rect x="106" y="40" width="8" height="8" fill="#f59e0b" opacity="0.60" />
    <rect x="114" y="40" width="8" height="8" fill="#fde047" opacity="0.40" />

    <rect x="162" y="30" width="8" height="8" fill="#f97316" opacity="0.62" />
    <rect x="170" y="30" width="8" height="8" fill="#f59e0b" opacity="0.62" />
    <rect x="178" y="30" width="8" height="8" fill="#fde047" opacity="0.42" />

    <rect x="258" y="28" width="8" height="8" fill="#fb7185" opacity="0.50" />
    <rect x="266" y="28" width="8" height="8" fill="#f97316" opacity="0.64" />
    <rect x="274" y="28" width="8" height="8" fill="#f59e0b" opacity="0.58" />
    <rect x="282" y="28" width="8" height="8" fill="#fde047" opacity="0.40" />

    <rect x="402" y="34" width="8" height="8" fill="#fb7185" opacity="0.52" />
    <rect x="410" y="34" width="8" height="8" fill="#f97316" opacity="0.66" />
    <rect x="418" y="34" width="8" height="8" fill="#f59e0b" opacity="0.56" />
    <rect x="426" y="34" width="8" height="8" fill="#fde047" opacity="0.38" />

    <rect x="538" y="30" width="8" height="8" fill="#fb7185" opacity="0.50" />
    <rect x="546" y="30" width="8" height="8" fill="#f97316" opacity="0.66" />
    <rect x="554" y="30" width="8" height="8" fill="#f59e0b" opacity="0.56" />
    <rect x="562" y="30" width="8" height="8" fill="#fde047" opacity="0.36" />

    <!-- ember noise -->
    <rect x="120" y="150" width="6" height="6" fill="#f97316" opacity="0.26" />
    <rect x="210" y="166" width="6" height="6" fill="#fb7185" opacity="0.22" />
    <rect x="312" y="160" width="6" height="6" fill="#fde047" opacity="0.20" />
    <rect x="494" y="154" width="6" height="6" fill="#f59e0b" opacity="0.22" />
    <rect x="610" y="162" width="6" height="6" fill="#fb7185" opacity="0.20" />
  </g>

  <!-- Base wordmark -->
  <g filter="url(#glow)">
    <text
      x="60"
      y="132"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="110"
      font-weight="850"
      letter-spacing="18"
      fill="url(#fill)"
      stroke="url(#stroke)"
      stroke-width="6"
      paint-order="stroke fill"
    >
      GLITCH
    </text>
  </g>

  <!-- Cinematic tearing slices (offset layers) -->
  <g filter="url(#glow)" opacity="0.95">
    <g clip-path="url(#sliceA)" opacity="0.85">
      <text
        x="66"
        y="132"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="110"
        font-weight="850"
        letter-spacing="18"
        fill="#fb7185"
        opacity="0.34"
      >
        GLITCH
      </text>
    </g>
    <g clip-path="url(#sliceB)" opacity="0.92">
      <text
        x="52"
        y="132"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="110"
        font-weight="850"
        letter-spacing="18"
        fill="#22c55e"
        opacity="0.22"
      >
        GLITCH
      </text>
      <rect x="58" y="102" width="600" height="6" fill="#0b1020" opacity="0.18" />
      <rect x="40" y="110" width="640" height="3" fill="#ffffff" opacity="0.08" />
    </g>
    <g clip-path="url(#sliceC)" opacity="0.85">
      <text
        x="62"
        y="132"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="110"
        font-weight="850"
        letter-spacing="18"
        fill="#60a5fa"
        opacity="0.26"
      >
        GLITCH
      </text>
    </g>
  </g>
</svg>

