<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Memory Vault: Local (Glitch)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56d3ff" stop-opacity="0.98" />
      <stop offset="55%" stop-color="#2b6bff" stop-opacity="0.98" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b7f0ff" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#7aa5ff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffb7ff" stop-opacity="0.45" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9fbff" />
      <stop offset="55%" stop-color="#c7d2fe" />
      <stop offset="100%" stop-color="#f5d0fe" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0b1a4a" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#7dd3fc" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#a855f7" flood-opacity="0.22" />
    </filter>
    <filter id="glyphGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7dd3fc" flood-opacity="0.65" />
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#a855f7" flood-opacity="0.28" />
    </filter>
    <filter id="pixelGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fb7185" flood-opacity="0.65" />
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f97316" flood-opacity="0.40" />
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Glass tile -->
  <g filter="url(#softGlow)">
    <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#bg)" />
    <rect x="12.5" y="12.5" width="103" height="103" rx="26" fill="none" stroke="url(#rim)" stroke-width="3" opacity="0.9" />
    <rect x="16" y="16" width="96" height="96" rx="23" fill="url(#glass)" opacity="0.9" />
    <path
      d="M22 28c10-10 38-14 58-10 14 3 22 8 28 16-10-6-20-9-34-10-20-2-40 3-52 14z"
      fill="#ffffff"
      opacity="0.16"
    />
    <circle cx="92" cy="40" r="10" fill="#ffffff" opacity="0.07" />
  </g>

  <!-- Local glyph -->
  <g filter="url(#glyphGlow)">
    <path d="M40 54l24-12 24 12-24 12z" fill="url(#glyph)" opacity="0.92" />
    <path d="M40 54v18l24 12V66z" fill="url(#glyph)" opacity="0.58" />
    <path d="M88 54v18L64 84V66z" fill="url(#glyph)" opacity="0.44" />

    <path d="M44 74l20-10 20 10-20 10z" fill="url(#glyph)" opacity="0.88" />
    <path d="M44 74v14l20 10V84z" fill="url(#glyph)" opacity="0.54" />
    <path d="M84 74v14L64 98V84z" fill="url(#glyph)" opacity="0.40" />

    <circle cx="64" cy="44" r="7" fill="url(#glyph)" opacity="0.92" />
    <circle cx="64" cy="44" r="3" fill="#0b1020" opacity="0.12" />
    <path d="M64 50v6" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Pixel-glitch overlay (cinematic, deliberate) -->
  <g shape-rendering="crispEdges" filter="url(#pixelGlow)" opacity="0.95">
    <!-- edge fragmentation -->
    <rect x="16" y="32" width="4" height="4" fill="#fb7185" opacity="0.75" />
    <rect x="20" y="32" width="4" height="4" fill="#f97316" opacity="0.55" />
    <rect x="104" y="26" width="4" height="4" fill="#60a5fa" opacity="0.55" />
    <rect x="108" y="26" width="4" height="4" fill="#f0abfc" opacity="0.50" />
    <rect x="18" y="98" width="4" height="4" fill="#22c55e" opacity="0.35" />
    <rect x="22" y="98" width="4" height="4" fill="#60a5fa" opacity="0.35" />
    <rect x="102" y="100" width="4" height="4" fill="#fb7185" opacity="0.60" />
    <rect x="106" y="100" width="4" height="4" fill="#f97316" opacity="0.45" />

    <!-- text/scan tearing -->
    <rect x="34" y="60" width="62" height="3" fill="#0b1020" opacity="0.22" />
    <rect x="28" y="63" width="72" height="2" fill="#ffffff" opacity="0.08" />
    <rect x="30" y="79" width="70" height="3" fill="#0b1020" opacity="0.18" />

    <!-- corruption bursts -->
    <rect x="52" y="44" width="4" height="4" fill="#f97316" opacity="0.55" />
    <rect x="56" y="44" width="4" height="4" fill="#fb7185" opacity="0.60" />
    <rect x="60" y="44" width="4" height="4" fill="#f0abfc" opacity="0.42" />
    <rect x="68" y="72" width="4" height="4" fill="#60a5fa" opacity="0.45" />
    <rect x="72" y="72" width="4" height="4" fill="#22c55e" opacity="0.30" />
  </g>
</svg>

