<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Signing in…</title>
    <style>
      :root {
        --sf-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: var(--sf-font);
        background: radial-gradient(1200px 900px at 20% 0%, #eef2ff, transparent 55%),
          radial-gradient(1000px 800px at 90% 20%, #f5f3ff, transparent 55%),
          linear-gradient(135deg, #eef2ff, #ffffff 38%, #f5f3ff);
        color: #0f172a;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        border-radius: 18px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 18px 50px rgba(2, 6, 23, 0.1);
        padding: 18px 18px;
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        opacity: 0.8;
        line-height: 1.45;
        font-size: 14px;
      }
      pre {
        margin: 12px 0 0 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.06);
        border: 1px solid rgba(15, 23, 42, 0.08);
        overflow: auto;
        font-size: 12px;
        display: none;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">Completing Google sign-in…</h1>
      <p id="hint">You can close this tab when it finishes.</p>
      <pre id="debug"></pre>
    </div>

    <script>
      (async () => {
        const title = document.getElementById("title");
        const hint = document.getElementById("hint");
        const debug = document.getElementById("debug");

        const showError = (message, details) => {
          title.textContent = "Sign-in failed";
          hint.innerHTML =
            `${String(message || "Unknown error")}` +
            ` — <a href=\"/Contents/Resources/Homepage.html\">Return to AgentC</a>.`;
          if (details) {
            debug.style.display = "block";
            debug.textContent = String(details);
          }
        };

        const loadScript = (src) =>
          new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.async = true;
            s.src = src;
            s.onload = resolve;
            s.onerror = () => reject(new Error(`Failed to load script: ${src}`));
            document.head.appendChild(s);
          });

        let config = null;
        try {
          const res = await fetch("/api/magic/config", { cache: "no-store" });
          const text = await res.text();
          config = JSON.parse(text);
          if (!res.ok) {
            showError(config?.error || `HTTP ${res.status}`, text);
            return;
          }
        } catch (e) {
          showError("Could not load Magic config.", e?.message || String(e));
          return;
        }

        const publishableKey = String(config?.publishableKey || "").trim();
        if (!publishableKey) {
          showError("Missing Magic publishable key.", "Expected /api/magic/config to return publishableKey.");
          return;
        }

        try {
          await loadScript("https://cdn.jsdelivr.net/npm/magic-sdk/dist/magic.js");
        } catch (e) {
          try {
            await loadScript("https://unpkg.com/magic-sdk/dist/magic.js");
          } catch (e2) {
            showError("Could not load Magic SDK.", e2?.message || String(e2));
            return;
          }
        }

        try {
          await loadScript("https://cdn.jsdelivr.net/npm/@magic-ext/oauth2/dist/extension.js");
        } catch {
          // best-effort; the SDK may still provide oauth (legacy)
        }

        const Magic = window.Magic;
        if (!Magic) {
          showError("Magic SDK is unavailable after script load.");
          return;
        }

        const OAuthExt = window.OAuthExtension || window.OAuthExtension?.OAuthExtension;
        const magic = new Magic(publishableKey, OAuthExt ? { extensions: [new OAuthExt()] } : undefined);

        try {
          const oauth = magic.oauth2 || magic.oauth;
          if (!oauth || typeof oauth.getRedirectResult !== "function") {
            showError("OAuth redirect handler is unavailable.", "Missing magic.oauth2.getRedirectResult()");
            return;
          }

          await oauth.getRedirectResult();

          try {
            const idToken = await magic.user.getIdToken();
            if (idToken) sessionStorage.setItem("mkMagicJwtV1", String(idToken));
          } catch {
            // ignore
          }

          title.textContent = "Signed in";
          hint.textContent = "Redirecting back to AgentC…";
          window.location.replace("/Contents/Resources/Homepage.html");
        } catch (e) {
          showError(e?.message || "OAuth callback failed.", e?.stack || String(e));
        }
      })();
    </script>
  </body>
</html>
